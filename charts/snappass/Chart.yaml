apiVersion: v2
name: snappass
description: Secure, ephemeral password sharing with time-based expiration and one-time retrieval
home: "https://github.com/lmacka/helm-snappass"
type: application
version: 0.3.0
appVersion: "2.0.0"
icon: https://lmacka.github.io/helm-snappass/img/pinterest-logo.png
keywords:
  - pinterest
  - password
  - secret
  - security
  - secure
  - share
sources:
  - https://github.com/lmacka/helm-snappass
maintainers:
  - name: lmacka
    url: https://github.com/lmacka
kubeVersion: ">=1.21.0-0"
dependencies:
  - name: valkey
    condition: valkey.enabled
    version: ~2.1
    repository: https://groundhog2k.github.io/helm-charts/
annotations:
  artifacthub.io/category: security
  artifacthub.io/license: MIT
  artifacthub.io/operator: "false"
  artifacthub.io/prerelease: "false"
  artifacthub.io/links: |
    - name: Upstream Project
      url: https://github.com/pinterest/snappass
    - name: Docker Hub
      url: https://hub.docker.com/r/lmacka/snappass
    - name: Live Demo
      url: https://snappass.ac3.com.au/
  artifacthub.io/images: |
    - name: snappass
      image: docker.io/lmacka/snappass:2.0.0
    - name: valkey
      image: docker.io/groundhog2k/valkey:8.1.6
    - name: init-wait
      image: docker.io/busybox:stable
  artifacthub.io/screenshots: |
    - title: Snappass UI
      url: https://lmacka.github.io/helm-snappass/img/snappass-ui.png
  artifacthub.io/changes: |
    - kind: changed
      description: Bump appVersion to 2.0.0 (zero-knowledge architecture)
    - kind: changed
      description: Snappass now encrypts/decrypts entirely in the browser (AES-256-GCM)
    - kind: changed
      description: Server only stores opaque encrypted blobs, never sees plaintext
    - kind: changed
      description: Upgraded to Python 3.12, Flask 3.1
    - kind: added
      description: Security headers (CSP, X-Frame-Options, Referrer-Policy)
    - kind: added
      description: Per-endpoint rate limiting via flask-limiter with Redis backend
    - kind: changed
      description: Replaced v1/v2 plaintext APIs with v3 zero-knowledge API
    - kind: removed
      description: Removed vendored Bootstrap, jQuery, Font Awesome, Clipboard.js
