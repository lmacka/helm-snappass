apiVersion: v2
name: snappass
description: Install the SnapPass secret tool
home: "https://github.com/lmacka/helm-snappass"
type: application
version: 0.2.0
appVersion: "1.6.2"
icon: https://lmacka.github.io/helm-snappass/img/pinterest-logo.png
keywords:
  - pinterest
  - password
  - secret
  - security
  - secure
  - share
sources:
  - https://github.com/lmacka/helm-snappass
maintainers:
  - name: lmacka
    url: https://github.com/lmacka
kubeVersion: ">=1.21.0-0"
dependencies:
  - name: valkey
    condition: valkey.enabled
    version: ~2.1
    repository: https://groundhog2k.github.io/helm-charts/
annotations:
  artifacthub.io/operator: "false"
  artifacthub.io/prerelease: "false"
  artifacthub.io/changes: |
    - kind: changed
      description: Make security contexts fully values-driven (pod, container, init container)
    - kind: changed
      description: Wire up liveness/readiness probe values in deployment template
    - kind: changed
      description: Default image pullPolicy to IfNotPresent and tag to appVersion
    - kind: changed
      description: Default ingress to disabled
    - kind: added
      description: PodDisruptionBudget template
    - kind: added
      description: Init container securityContext and configurable image
    - kind: fixed
      description: Hardened test pod with pinned image, securityContext, and resource limits
    - kind: removed
      description: Removed unused waitForValkeyTimeout value
    - kind: changed
      description: Conditional ingressClassName rendering
    - kind: added
      description: Declared volumeMounts and volumes defaults in values
