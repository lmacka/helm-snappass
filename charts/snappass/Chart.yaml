apiVersion: v2
name: snappass
description: Secure, ephemeral password sharing with time-based expiration and one-time retrieval
home: "https://github.com/lmacka/helm-snappass"
type: application
version: 0.2.0
appVersion: "0.1.3"
icon: https://lmacka.github.io/helm-snappass/img/pinterest-logo.png
keywords:
  - pinterest
  - password
  - secret
  - security
  - secure
  - share
sources:
  - https://github.com/lmacka/helm-snappass
maintainers:
  - name: lmacka
    url: https://github.com/lmacka
kubeVersion: ">=1.21.0-0"
dependencies:
  - name: valkey
    condition: valkey.enabled
    version: ~2.1
    repository: https://groundhog2k.github.io/helm-charts/
annotations:
  artifacthub.io/category: security
  artifacthub.io/license: MIT
  artifacthub.io/operator: "false"
  artifacthub.io/prerelease: "false"
  artifacthub.io/links: |
    - name: Upstream Project
      url: https://github.com/pinterest/snappass
    - name: Docker Hub
      url: https://hub.docker.com/r/lmacka/snappass
    - name: Live Demo
      url: https://snappass.ac3.com.au/
  artifacthub.io/images: |
    - name: snappass
      image: docker.io/lmacka/snappass:0.1.3
    - name: valkey
      image: docker.io/groundhog2k/valkey:8.1.6
    - name: init-wait
      image: docker.io/busybox:stable
  artifacthub.io/screenshots: |
    - title: Snappass UI
      url: https://lmacka.github.io/helm-snappass/img/snappass-ui.png
  artifacthub.io/changes: |
    - kind: changed
      description: Make security contexts fully values-driven (pod, container, init container)
    - kind: changed
      description: Wire up liveness/readiness probe values in deployment template
    - kind: changed
      description: Default image pullPolicy to IfNotPresent and tag to appVersion
    - kind: changed
      description: Default ingress to disabled
    - kind: added
      description: PodDisruptionBudget template
    - kind: added
      description: Init container securityContext and configurable image
    - kind: fixed
      description: Hardened test pod with pinned image, securityContext, and resource limits
    - kind: removed
      description: Removed unused waitForValkeyTimeout value
    - kind: changed
      description: Conditional ingressClassName rendering
    - kind: added
      description: Declared volumeMounts and volumes defaults in values
    - kind: changed
      description: Default Valkey storage to emptyDir (no PVC) for ephemeral workloads
    - kind: changed
      description: Disable Valkey RDB snapshotting by default
    - kind: changed
      description: Use /_/_/health for probe endpoints instead of /
