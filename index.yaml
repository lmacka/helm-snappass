  - annotations:
      artifacthub.io/category: security
      artifacthub.io/changes: |
        - kind: changed
          description: Bump appVersion to 2.0.0 (zero-knowledge architecture)
        - kind: changed
          description: Snappass now encrypts/decrypts entirely in the browser (AES-256-GCM)
        - kind: changed
          description: Server only stores opaque encrypted blobs, never sees plaintext
        - kind: changed
          description: Upgraded to Python 3.12, Flask 3.1
        - kind: added
          description: Security headers (CSP, X-Frame-Options, Referrer-Policy)
        - kind: added
          description: Per-endpoint rate limiting via flask-limiter with Redis backend
        - kind: changed
          description: Replaced v1/v2 plaintext APIs with v3 zero-knowledge API
        - kind: removed
          description: Removed vendored Bootstrap, jQuery, Font Awesome, Clipboard.js
      artifacthub.io/images: |
        - name: snappass
          image: docker.io/lmacka/snappass:2.0.0
        - name: valkey
          image: docker.io/groundhog2k/valkey:8.1.6
        - name: init-wait
          image: docker.io/busybox:stable
      artifacthub.io/license: MIT
